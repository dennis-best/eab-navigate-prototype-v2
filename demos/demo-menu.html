<!-- Shared demo menu — paste at bottom of <body> (below footer/main).
     Include <link rel="stylesheet" href="../unset.css" /> and
     <link rel="stylesheet" href="../demo-menu.css" /> immediately before the nav. -->
<link rel="stylesheet" href="../unset.css" />
<link rel="stylesheet" href="../demo-menu.css" />
<nav class="unset demo-menu-bar" aria-label="Prototype demo controls">
  <button type="button" class="demo-menu-bar__brand" onclick="location.href='../index.html'">
    <img class="demo-menu-bar__logo" src="assets/shared/eab-mark-white.svg" alt="" width="28" height="28" />
    Prototypes
  </button>
  <div class="demo-menu-bar__menus">
    <div class="demo-menu">
      <button type="button" class="demo-menu__toggle" aria-haspopup="true" aria-expanded="false">
        Scenarios<span class="demo-menu__caret" aria-hidden="true">▴</span>
      </button>
      <div class="demo-menu__panel demo-menu__panel--wide" hidden>
        <div id="scenarios-menu-list" class="scenarios-menu-list"></div>
      </div>
    </div>
    <div class="demo-menu">
      <button type="button" class="demo-menu__toggle" aria-haspopup="true" aria-expanded="false">
        Personas<span class="demo-menu__caret" aria-hidden="true">▴</span>
      </button>
      <div class="demo-menu__panel" hidden>
        <p class="demo-menu__note"><!-- persona --></p>
      </div>
    </div>
    <div class="demo-menu">
      <button type="button" class="demo-menu__toggle" aria-haspopup="true" aria-expanded="false">
        Theme<span class="demo-menu__caret" aria-hidden="true">▴</span>
      </button>
      <div class="demo-menu__panel demo-menu__panel--theme" hidden>
        <p class="demo-menu__note" data-theme-current>HI/P — current</p>
        <button type="button" class="demo-menu__link" data-theme-target="classic">Classic</button>
        <button type="button" class="demo-menu__link" data-theme-target="hip">HI/P</button>
        <p class="demo-menu__note demo-menu__note--muted">Modern (coming soon)</p>
      </div>
    </div>
    <div class="demo-menu">
      <button type="button" class="demo-menu__toggle" aria-haspopup="true" aria-expanded="false">
        Settings<span class="demo-menu__caret" aria-hidden="true">▴</span>
      </button>
      <div class="demo-menu__panel" hidden>
        <button type="button" class="demo-menu__link" onclick="location.href='../index.html'">Back to Index</button>
        <button type="button" class="demo-menu__link" onclick="location.href='help.html'">Help</button>
      </div>
    </div>
  </div>
</nav>
